
# Configuration for pytest and pytest-cov (coverage metrics).
#
# Run tests with coverage:
#     pytest --cov
#
# Run and see which specific lines are not covered:
#     pytest --cov --cov-report=term-missing
#
# Generate an HTML coverage report you can open in a browser:
#     pytest --cov --cov-report=html
#     open htmlcov/index.html

[tool:pytest]
# tells pytest where to find tests
testpaths = tests

# show a short summary of all failures at the end
addopts = --tb=short

[coverage:run]
# measure coverage for the app folder only — not tests or venv
source = app

# don't measure coverage inside these folders
omit =
    app/config/seeding.py
    app/config/environment.py
    venv/*
    tests/*

[coverage:report]
# don't report on files with 100% coverage — keeps the output clean
skip_covered = False

# show which line numbers are missing coverage
show_missing = True

# fail the build if coverage drops below this percentage
# start at 50 and raise it as you add more tests
fail_under = 50

[coverage:html]
# folder where the HTML coverage report is saved
directory = htmlcov
